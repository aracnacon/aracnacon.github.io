    <!-- MAIN: Primary content -->
    <main>

      <!-- About Me -->
      <section>
        <h2>Social Media</h2>
        <div class="social-row">
          <img
            src="images/MeHeadSun.jpeg"
            alt="Profile photo of Brandon"
            width="200"
            height="200"
          />
          <div class="social-links">
            <a href="mailto:brandon.hixson@aracnatech.com"><i class="fa-solid fa-spider"></i> brandon.hixson@aracnatech.com</a>
            <a href="https://github.com/aracnacon"><i class="fa-brands fa-github"></i> GitHub</a>

          </div>
        </div>
      </section>

      <!-- Contact Form -->
      <section>
        <h2>Contact Me</h2>
        <form action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="b3266e06-aea0-40b0-ae30-57e058c48600" />
          <input type="hidden" name="redirect" value="https://aracnacon.github.io/thanks.html" />
          <input type="hidden" name="subject" value="New message from your website" />
          <input type="checkbox" name="botcheck" class="hidden" style="display: none;" />
          <label for="name">Name:</label><br />
          <input type="text" id="name" name="name" placeholder="Your name" required /><br /><br />

          <label for="email">Email:</label><br />
          <input type="email" id="email" name="email" placeholder="Your email" required /><br /><br />

          <label for="message">Message:</label><br />
          <textarea id="message" name="message" rows="4" cols="40" placeholder="Say hello!" required></textarea><br /><br />

          <button type="submit">Send</button>
        </form>
      </section>

    </main>
